<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00A896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007A7A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#005F5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D3D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baseFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1A1F;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#007A7A" flood-opacity="0.2"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Left face -->
    <polygon points="100,28 35,148 100,130" fill="url(#leftFace)"/>
    <!-- Right face -->
    <polygon points="100,28 165,148 100,130" fill="url(#rightFace)"/>
    <!-- Base -->
    <polygon points="35,148 100,168 165,148 100,130" fill="url(#baseFace)"/>
  </g>

  <!-- Edge highlights -->
  <line x1="100" y1="28" x2="35" y2="148" stroke="#00C9B8" stroke-width="0.7" opacity="0.5"/>
  <line x1="100" y1="28" x2="165" y2="148" stroke="#003D3D" stroke-width="0.7" opacity="0.4"/>
  <line x1="100" y1="28" x2="100" y2="130" stroke="#009988" stroke-width="0.5" opacity="0.3"/>

  <!-- Apex vertex - Client (elevated, glowing white) -->
  <circle cx="100" cy="28" r="5" fill="white" opacity="0.9" filter="url(#glow)"/>
  <circle cx="100" cy="28" r="2.8" fill="#00C9B8"/>

  <!-- Base vertices - Partners (subtle) -->
  <circle cx="35" cy="148" r="3" fill="#009988" opacity="0.7"/>
  <circle cx="165" cy="148" r="3" fill="#009988" opacity="0.7"/>
</svg>
